<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link visualization</title>
  <style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a1a;
    font-family: Helvetica, Arial, sans-serif;
    color: #e0e0e0;
  }

  #canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #legend {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 10;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }

  #legend h2 {
    margin: 0 0 8px;
    font-size: 14px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    cursor: pointer;
    opacity: 0.8;
  }

  .legend-item:hover {
    opacity: 1;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 13px;
  }

  .legend-count {
    font-size: 11px;
    color: #666;
    margin-left: auto;
  }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10, 10, 26, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    z-index: 20;
    display: none;
    max-width: 300px;
    white-space: nowrap;
  }

  .tooltip-title {
    font-weight: 600;
    margin-bottom: 2px;
  }

  .tooltip-category {
    font-size: 11px;
    color: #888;
  }

  .tooltip-count {
    font-size: 11px;
    color: #aaa;
  }

  #detail-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100%;
    background: rgba(10, 10, 26, 0.95);
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 30;
    padding: 20px;
    overflow-y: auto;
    transition: right 0.25s ease;
  }

  #detail-panel.open {
    right: 0;
  }

  #detail-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  #detail-panel .close-btn:hover {
    color: #fff;
  }

  #detail-panel h2 {
    margin: 0 0 4px;
    font-size: 1.2rem;
    padding-right: 32px;
  }

  #detail-panel .panel-category {
    font-size: 12px;
    color: #888;
    margin-bottom: 16px;
  }

  #detail-panel .link-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  #detail-panel .link-list li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  #detail-panel .link-list li:last-child {
    border-bottom: none;
  }

  #detail-panel .link-list a {
    color: #6ab0ff;
    text-decoration: none;
    word-break: break-all;
  }

  #detail-panel .link-list a:hover {
    text-decoration: underline;
  }

  #detail-panel .link-desc {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  #detail-panel .link-children {
    list-style: none;
    padding-left: 16px;
    margin-top: 4px;
  }

  #detail-panel .link-children li {
    padding: 4px 0;
    border-bottom: none;
  }

  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    color: #666;
  }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <div id="canvas-container"></div>
  <div id="legend"></div>
  <div id="tooltip"></div>
  <div id="detail-panel">
    <button class="close-btn">&times;</button>
    <h2 id="panel-title"></h2>
    <div class="panel-category" id="panel-category"></div>
    <ul class="link-list" id="panel-links"></ul>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Fetch data from index.html at runtime
const resp = await fetch("index.html");
const html = await resp.text();
const match = html.match(/<script id="pages-data" type="application\/json">([\s\S]*?)<\/scr/);
const pages = JSON.parse(match[1]);

document.getElementById('loading').style.display = 'none';

// Group by category
const categoryMap = {};
for (const p of pages) {
  const cat = p.category || 'Uncategorized';
  if (!categoryMap[cat]) categoryMap[cat] = [];
  categoryMap[cat].push(p);
}
const categories = Object.keys(categoryMap).sort();

// Category colors
const palette = [
  '#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c', '#38d9a9',
  '#4dabf7', '#748ffc', '#9775fa', '#da77f2', '#f783ac',
  '#e8590c', '#20c997', '#339af0', '#845ef7', '#f06595',
  '#fd7e14',
];
const categoryColors = {};
categories.forEach((cat, i) => {
  categoryColors[cat] = palette[i % palette.length];
});

// Build legend
const legend = document.getElementById('legend');
let legendHtml = '<h2>Categories</h2>';
for (const cat of categories) {
  const count = categoryMap[cat].length;
  legendHtml += `<div class="legend-item" data-category="${esc(cat)}">
    <div class="legend-dot" style="background: ${categoryColors[cat]}"></div>
    <span class="legend-label">${esc(cat)}</span>
    <span class="legend-count">${count}</span>
  </div>`;
}
legend.innerHTML = legendHtml;

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.003);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 200;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 1, 300);
pointLight.position.set(50, 50, 50);
scene.add(pointLight);

// Position categories in a circle, pages clustered around their category
const categoryPositions = {};
const catRadius = 35;
categories.forEach((cat, i) => {
  const angle = (i / categories.length) * Math.PI * 2;
  categoryPositions[cat] = new THREE.Vector3(
    Math.cos(angle) * catRadius,
    (Math.random() - 0.5) * 15,
    Math.sin(angle) * catRadius
  );
});

// Create node meshes
const nodeData = []; // { mesh, page, category }
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

for (const cat of categories) {
  const center = categoryPositions[cat];
  const color = new THREE.Color(categoryColors[cat]);

  // Category label sprite
  const labelSprite = makeTextSprite(cat, { fontSize: 28, color: categoryColors[cat], bold: true });
  labelSprite.position.copy(center);
  labelSprite.position.y += 8;
  scene.add(labelSprite);

  for (let i = 0; i < categoryMap[cat].length; i++) {
    const page = categoryMap[cat][i];
    const linkCount = page.links ? page.links.length : (page.html ? 5 : 0);
    const radius = 0.3 + Math.min(linkCount / 8, 1.5);

    // Spread pages around category center
    const spread = 6 + Math.sqrt(categoryMap[cat].length) * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = Math.random() * spread;

    const pos = new THREE.Vector3(
      center.x + r * Math.sin(phi) * Math.cos(theta),
      center.y + r * Math.sin(phi) * Math.sin(theta),
      center.z + r * Math.cos(phi)
    );

    const geometry = new THREE.SphereGeometry(radius, 16, 12);
    const material = new THREE.MeshPhongMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.3,
      shininess: 80,
      transparent: true,
      opacity: 0.85,
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(pos);
    scene.add(mesh);

    nodeData.push({ mesh, page, category: cat, baseEmissive: 0.3, radius });
  }
}

// Starfield background
const starGeometry = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
  starPositions[i] = (Math.random() - 0.5) * 400;
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Draw faint lines from each page node to its category center
for (const nd of nodeData) {
  const center = categoryPositions[nd.category];
  const points = [nd.mesh.position, center];
  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const lineMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(categoryColors[nd.category]),
    transparent: true,
    opacity: 0.08,
  });
  const line = new THREE.Line(lineGeo, lineMat);
  scene.add(line);
}

// Text sprite helper
function makeTextSprite(text, { fontSize = 20, color = '#ffffff', bold = false } = {}) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const font = `${bold ? 'bold ' : ''}${fontSize}px Helvetica, Arial, sans-serif`;
  ctx.font = font;
  const metrics = ctx.measureText(text);
  const width = metrics.width + 16;
  const height = fontSize + 12;
  canvas.width = width;
  canvas.height = height;

  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 8, height / 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(width / 30, height / 30, 1);
  return sprite;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
let hoveredNode = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = nodeData.map(n => n.mesh);
  const intersects = raycaster.intersectObjects(meshes);

  // Reset previous hover
  if (hoveredNode) {
    hoveredNode.mesh.material.emissiveIntensity = hoveredNode.baseEmissive;
    hoveredNode = null;
  }

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const nd = nodeData.find(n => n.mesh === hit);
    if (nd) {
      hoveredNode = nd;
      nd.mesh.material.emissiveIntensity = 0.8;
      const linkCount = nd.page.links ? nd.page.links.length : 0;
      tooltip.innerHTML = `<div class="tooltip-title">${esc(nd.page.title)}</div>
        <div class="tooltip-category" style="color: ${categoryColors[nd.category]}">${esc(nd.category)}</div>
        <div class="tooltip-count">${linkCount} link${linkCount !== 1 ? 's' : ''}</div>`;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
}

// Click to show detail panel
const detailPanel = document.getElementById('detail-panel');
const panelTitle = document.getElementById('panel-title');
const panelCategory = document.getElementById('panel-category');
const panelLinks = document.getElementById('panel-links');

function onClick(e) {
  if (e.target.closest('#detail-panel') || e.target.closest('#legend')) return;

  raycaster.setFromCamera(mouse, camera);
  const meshes = nodeData.map(n => n.mesh);
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const nd = nodeData.find(n => n.mesh === hit);
    if (nd) showDetail(nd);
  } else {
    detailPanel.classList.remove('open');
  }
}

function showDetail(nd) {
  const page = nd.page;
  panelTitle.textContent = page.title;
  panelTitle.style.color = categoryColors[nd.category];
  panelCategory.textContent = nd.category;

  let html = '';
  if (page.links) {
    for (const link of page.links) {
      html += renderPanelLink(link);
    }
  } else if (page.html) {
    html += '<li><em>Pre-formatted content</em></li>';
  }
  panelLinks.innerHTML = html;
  detailPanel.classList.add('open');
}

function renderPanelLink(link) {
  let h = '<li>';
  if (link.url) {
    h += `<a href="${esc(link.url)}" target="_blank" rel="noopener">${esc(link.name)}</a>`;
  } else {
    h += `<strong>${esc(link.name)}</strong>`;
  }
  if (link.desc) {
    h += `<div class="link-desc">${esc(link.desc)}</div>`;
  }
  if (link.children) {
    h += '<ul class="link-children">';
    for (const child of link.children) {
      h += renderPanelLink(child);
    }
    h += '</ul>';
  }
  h += '</li>';
  return h;
}

detailPanel.querySelector('.close-btn').addEventListener('click', () => {
  detailPanel.classList.remove('open');
});

// Legend click -> fly to category
legend.addEventListener('click', (e) => {
  const item = e.target.closest('.legend-item');
  if (!item) return;
  const cat = item.dataset.category;
  const target = categoryPositions[cat];
  if (target) {
    controls.target.copy(target);
  }
});

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate() {
  requestAnimationFrame(animate);

  // Subtle bobbing
  const time = Date.now() * 0.001;
  for (const nd of nodeData) {
    nd.mesh.position.y += Math.sin(time + nd.mesh.position.x * 0.1) * 0.002;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
  </script>
</body>
</html>
